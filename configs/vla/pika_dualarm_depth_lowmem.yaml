model:
  model_path: /mnt/ceph/ckpt/lingbot-vla-4b-depth
  config_path: configs/model_configs/lingbot-vla-4b-depth-pi0-current
  tokenizer_path: /mnt/ceph/ckpt/Qwen2.5-VL-3B-Instruct
  moge_path: /mnt/ceph/ckpt/MoGe2/MoGe_2_vit_b_normal.pt
  morgbd_path: /mnt/ceph/ckpt/lingbot-depth-pretrain-vitl-14/model.pt

data:
  datasets_type: vla
  data_name: pika_dualarm
  train_path: /mnt/ceph2/SIRIUS_LAB_Pika_TeleOp_Bimanual/lerobot_pidata/lerobot_pidata
  joints:
    - arm.position: 14
    - effector.position: 2
  cameras:
    - camera_top
    - camera_wrist_left
    - camera_wrist_right
  num_workers: 4
  norm_type: meanstd
  norm_stats_file: assets/norm_stats/pika_dualarm.json

train:
  output_dir: output/pika_dualarm_depth
  data_parallel_mode: fsdp2
  enable_full_shard: true
  module_fsdp_enable: true
  use_compile: false
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 72
  max_action_dim: 75
  max_state_dim: 75
  lr: 5.0e-5
  lr_decay_style: constant
  micro_batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 40000
  ckpt_manager: dcp
  save_steps: 10000
  save_epochs: 0
  enable_fp32: true
  enable_resume: true
  align_params:
    mode: query
    num_task_tokens: 8
    use_image_tokens: true
    use_task_tokens: false
    use_text_tokens: false
    use_contrastive: true
    contrastive_loss_weight: 0.3
    depth_loss_weight: 0.004
    llm:
      dim_out: 2048
      image_token_size: 8
      image_input_size: 224
    depth:
      model_type: MoRGBD
      num_layers: 1
      num_heads: 4
      dim_head: 32
      ff_mult: 1
      num_backbone_tokens: 256
      token_size: 16
      dim_out: 1024
      input_size: 224
