states:
  - observation.state.arm.position:
      origin_keys:
        - observation.state:
            start: 0
            end: 6
        - observation.state:
            start: 6
            end: 12

  - observation.state.effector.position:
      origin_keys:
        - observation.state:
            start: 12
            end: 13
        - observation.state:
            start: 13
            end: 14

actions:
  - action.arm.position:
      origin_keys:
        - action:
            start: 0
            end: 6
        - action:
            start: 6
            end: 12
      subtract_state: true

  - action.effector.position:
      origin_keys:
        - action:
            start: 12
            end: 13
        - action:
            start: 13
            end: 14
      subtract_state: false

images:
  - observation.images.camera_top:
      origin_keys: observation.images.scene
  - observation.images.camera_wrist_left:
      origin_keys: observation.images.left_wrist
  - observation.images.camera_wrist_right:
      origin_keys: observation.images.right_wrist
